<template>
    <lightning-card icon-name="standard:investment_account">
        <span slot="title">Share Transfer ({recordCount})</span>

        <lightning-button
            slot="actions"
            label="New"
            title="New Share Transfer"
            onclick={handleNew}>
        </lightning-button>

        <c-offering-datatable
            key-field="id"
            data={rows}
            columns={columns}
            hide-checkbox-column>
        </c-offering-datatable>

        <div class="view-all-footer">
            <a href="#" onclick={handleViewAll}>View All</a>
        </div>
    </lightning-card>

    <!-- New Share Transfer modal -->
    <template lwc:if={showModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading"
            class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close" onclick={closeModal}>
                        <lightning-icon
                            icon-name="utility:close"
                            alternative-text="Close"
                            variant="inverse"
                            size="small">
                        </lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="modal-heading" class="slds-modal__title slds-hyphenate">New Share Transfer</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-grid slds-gutters slds-wrap">
                        <!-- Row 1 -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                            <lightning-record-picker
                                label="Transfer From"
                                placeholder="Search Investing Entities..."
                                object-api-name="Unison__Investing_Entity__c"
                                value={transferFrom}
                                onchange={handleTransferFromChange}>
                            </lightning-record-picker>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                            <lightning-record-picker
                                label="Transfer To"
                                placeholder="Search Investing Entities..."
                                object-api-name="Unison__Investing_Entity__c"
                                value={transferTo}
                                onchange={handleTransferToChange}>
                            </lightning-record-picker>
                        </div>

                        <!-- Row 2 -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                            <lightning-input
                                type="number"
                                label="Shares To Transfer"
                                value={sharesToTransfer}
                                onchange={handleSharesChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                            <lightning-input
                                type="number"
                                formatter="currency"
                                label="Sale Price"
                                value={salePrice}
                                onchange={handleSalePriceChange}>
                            </lightning-input>
                        </div>

                        <!-- Row 3 -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                            <lightning-input
                                type="number"
                                formatter="currency"
                                label="Purchase Price"
                                value={purchasePrice}
                                onchange={handlePurchasePriceChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                            <lightning-combobox
                                label="Transfer Type"
                                value={transferType}
                                options={transferTypeOptions}
                                onchange={handleTransferTypeChange}>
                            </lightning-combobox>
                        </div>

                        <!-- Row 4 -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                            <lightning-input
                                type="date"
                                label="Transfer Date"
                                value={transferDate}
                                onchange={handleTransferDateChange}>
                            </lightning-input>
                        </div>
                    </div>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                    <lightning-button
                        class="slds-m-left_x-small"
                        label="Save"
                        variant="brand"
                        onclick={handleSave}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
