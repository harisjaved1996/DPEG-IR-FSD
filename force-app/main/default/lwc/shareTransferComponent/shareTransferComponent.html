<template>
    <lightning-card icon-name="standard:investment_account">
        <span slot="title">Share Transfer ({recordCount})</span>

        <c-offering-datatable
            key-field="id"
            data={rows}
            columns={columns}
            hide-checkbox-column>
        </c-offering-datatable>

        <div slot="footer" class="view-all-footer">
            <a href="#" onclick={handleViewAll}>View All</a>
        </div>
    </lightning-card>
</template>
