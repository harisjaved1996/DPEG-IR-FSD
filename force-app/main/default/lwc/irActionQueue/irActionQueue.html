<template>
    <div class="aq-card">
        <div class="aq-header-title">
            <lightning-icon
                icon-name="utility:task"
                size="small"
                class="aq-header-icon-plain"
                style={headerIconStyle}>
            </lightning-icon>
            <span class="slds-text-heading_medium aq-title">Action Queue</span>
        </div>
        <ul class="aq-list">
            <template for:each={actions} for:item="action">
                <li key={action.id} class="aq-item">
                    <lightning-icon
                        icon-name={action.iconName}
                        size="small"
                        class="aq-item-icon-plain"
                        style={action.iconStyle}>
                    </lightning-icon>
                    <span class="slds-text-body_regular aq-item-title">{action.title}</span>
                </li>
            </template>
        </ul>
    </div>
</template>
