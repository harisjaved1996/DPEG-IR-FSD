<template>
    <div class="ir-offering-header">
        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_large ir-offering-header__loader">
                <lightning-spinner alternative-text="Loading offering header" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={showContent}>
            <header class="slds-m-bottom_small ir-offering-header__titlebar">
                <h1 class="slds-text-heading_large ir-offering-header__title">{titleText}</h1>
                <template lwc:if={status}>
                    <c-status-badge status={status}></c-status-badge>
                </template>
            </header>

            <!-- 8-STAGE LIFECYCLE -->
            <template lwc:if={hasStages}>
                <div class="slds-m-bottom_medium ir-offering-header__stages">
                    <c-stage-tracker stages={stages} current-index={currentStageIndex}></c-stage-tracker>
                </div>
            </template>

            <!-- KPI ROW (6 tiles) -->
            <template lwc:if={hasKpis}>
                <lightning-layout multiple-rows="true" class="ir-offering-header__kpis">
                    <template for:each={kpis} for:item="kpi">
                        <lightning-layout-item
                            key={kpi.key}
                            size="12"
                            small-device-size="6"
                            medium-device-size="4"
                            large-device-size="2"
                            padding="around-x-small"
                        >
                            <c-kpi-card
                                label={kpi.label}
                                value={kpi.displayValue}
                                unit={kpi.unit}
                                icon-name={kpi.iconName}
                                accent={kpi.accent}
                            ></c-kpi-card>
                        </lightning-layout-item>
                    </template>
                </lightning-layout>
            </template>
        </template>

        <template lwc:if={hasError}>
            <div class="slds-box slds-theme_error slds-m-top_small" role="alert">
                <p class="slds-text-body_regular">
                    Unable to load the offering header. Please refresh or contact your administrator.
                </p>
            </div>
        </template>
    </div>
</template>
