<template>
    <section
        role="dialog"
        tabindex="-1"
        aria-modal="true"
        aria-labelledby="batch-detail-heading"
        class="slds-modal slds-fade-in-open ir-batch-detail"
    >
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <button
                    type="button"
                    class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                    title="Close"
                    onclick={handleClose}
                >
                    <lightning-icon
                        icon-name="utility:close"
                        size="small"
                        variant="inverse"
                        alternative-text="Close"
                    ></lightning-icon>
                </button>
                <h2 id="batch-detail-heading" class="slds-modal__title slds-hyphenate">{headerLabel}</h2>
                <p class="slds-text-body_small slds-m-top_xx-small">{rowCount} investor distribution(s)</p>
            </header>

            <div class="slds-modal__content slds-p-around_medium ir-batch-detail__content">
                <template lwc:if={isLoading}>
                    <div class="slds-is-relative slds-p-around_large">
                        <lightning-spinner alternative-text="Loading batch detail" size="medium"></lightning-spinner>
                    </div>
                </template>

                <template lwc:if={showTable}>
                    <lightning-datatable
                        key-field="id"
                        data={rows}
                        columns={columns}
                        hide-checkbox-column
                    ></lightning-datatable>
                </template>

                <template lwc:if={showEmpty}>
                    <div class="slds-text-align_center slds-p-vertical_medium" role="status">
                        <p class="slds-text-body_regular slds-text-color_weak">
                            No investor distributions in this batch.
                        </p>
                    </div>
                </template>

                <template lwc:if={hasError}>
                    <div class="slds-box slds-theme_error" role="alert">
                        <p class="slds-text-body_regular">
                            Unable to load the batch detail. Please try again.
                        </p>
                    </div>
                </template>
            </div>

            <footer class="slds-modal__footer">
                <button type="button" class="slds-button slds-button_neutral" onclick={handleClose}>
                    Close
                </button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
</template>
