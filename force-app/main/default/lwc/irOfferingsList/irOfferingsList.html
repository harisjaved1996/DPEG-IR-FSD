<template>
    <div class="card">
        <table class="list-table">
            <thead>
                <tr>
                    <th class="th-text">Offering</th>
                    <th class="th-text">Stage</th>
                    <th class="th-num">Target</th>
                    <th class="th-num">Committed</th>
                    <th class="th-num">Funded</th>
                    <th class="th-text">Progress</th>
                </tr>
            </thead>
            <tbody>
                <template for:each={rows} for:item="row">
                    <tr key={row.id}>
                        <td class="td-text"><span class="row-name">{row.name}</span></td>
                        <td class="td-text"><span class={row.badgeCss}>{row.stage}</span></td>
                        <td class="td-num">{row.target}</td>
                        <td class="td-num">{row.committed}</td>
                        <td class="td-num">{row.funded}</td>
                        <td class="td-text">
                            <div class="progress-cell">
                                <div class="progress-track">
                                    <div class="progress-fill" style={row.barStyle}></div>
                                </div>
                                <span class="progress-pct" style={row.pctStyle}>{row.pctLabel}</span>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
        <div class="list-footer">
            <button class="view-all-btn" type="button">View All</button>
        </div>
    </div>
</template>
