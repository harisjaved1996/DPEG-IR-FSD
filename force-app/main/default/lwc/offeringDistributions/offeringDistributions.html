<template>
    <div class="ir-offering-distributions">
        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_large">
                <lightning-spinner alternative-text="Loading distribution batches" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={showContent}>
            <c-data-table-card
                title="Distribution Batches"
                icon-name="utility:money"
                columns={columns}
                rows={rows}
                key-field="id"
                empty-message="No distribution batches for this offering."
            ></c-data-table-card>
        </template>

        <template lwc:if={hasError}>
            <div class="slds-box slds-theme_error slds-m-top_small" role="alert">
                <p class="slds-text-body_regular">
                    Unable to load distribution batches. Please refresh or contact your administrator.
                </p>
            </div>
        </template>
    </div>
</template>
