<template>
    <div class="container">
        <div class="cards-grid">
            <template for:each={stats} for:item="card">
                <article key={card.key} class="wm-card">
                    <div class="wm-header" style={card.headerStyle}>{card.matchLabel}</div>
                    <div class="card-body slds-p-around_small">
                        <lightning-icon
                            icon-name={card.iconName}
                            size="small"
                            class="stat-icon-plain"
                            style={card.iconStyle}>
                        </lightning-icon>
                        <div class="text-col">
                            <span class="slds-text-heading_medium stat-value slds-truncate" title={card.value}>{card.value}</span>
                            <span class="slds-text-title_caps stat-label slds-truncate" title={card.label}>{card.label}</span>
                        </div>
                    </div>
                </article>
            </template>
        </div>
    </div>
</template>
