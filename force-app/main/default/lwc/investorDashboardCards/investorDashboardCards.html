<template>
    <div class="dashboard-cards">
        <div class="cards-row">
            <template for:each={metrics} for:item="metric">
                <c-stat-card
                    key={metric.key}
                    value={metric.displayValue}
                    label={metric.label}
                    icon-name={metric.iconName}
                    value-color={metric.valueColor}>
                </c-stat-card>
            </template>
        </div>
    </div>
</template>
