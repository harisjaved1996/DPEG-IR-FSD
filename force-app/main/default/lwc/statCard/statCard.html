<template>
    <article class="stat-card slds-p-around_small">
        <div class="card-body">
            <lightning-icon
                icon-name={iconName}
                size="small"
                class="stat-icon">
            </lightning-icon>
            <div class="text-col">
                <span class="slds-text-heading_medium stat-value slds-truncate" title={value}>{value}</span>
                <span class="slds-text-title stat-label slds-truncate" title={label}>{label}</span>
            </div>
        </div>
    </article>
</template>
