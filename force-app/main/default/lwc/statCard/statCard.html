<template>
    <article class="stat-card slds-p-around_small">
        <div class="card-body">
            <template lwc:if={plainIcon}>
                <lightning-icon
                    icon-name={iconName}
                    size="small"
                    class="stat-icon-plain"
                    style={iconStyle}>
                </lightning-icon>
            </template>
            <template lwc:else>
                <span class="stat-icon">
                    <lightning-icon
                        icon-name={iconName}
                        size="small"
                        class="stat-icon-inner">
                    </lightning-icon>
                </span>
            </template>
            <div class="text-col">
                <span class="slds-text-heading_medium stat-value slds-truncate" title={value}>{value}</span>
                <span class="slds-text-title_caps stat-label slds-truncate" title={label}>{label}</span>
            </div>
        </div>
    </article>
</template>
