<template>
    <article class="stat-card">
        <div class="card-body">
            <div class="icon-badge" style={badgeStyle}>
                <lightning-icon icon-name={iconName} size="x-small" variant="inverse"></lightning-icon>
            </div>
            <div class="text-col">
                <span class="stat-value" style={valueStyle}>{value}</span>
                <span class="stat-label">{label}</span>
            </div>
        </div>
    </article>
</template>
