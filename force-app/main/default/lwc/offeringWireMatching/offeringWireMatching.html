<template>
    <div class="wm">
        <!-- Sub-tab chip row (custom, matches the page's pill design language) -->
        <div class="wm-tabs" role="tablist" aria-label="Wire matching categories">
            <template for:each={tabs} for:item="t">
                <button
                    key={t.key}
                    type="button"
                    role="tab"
                    class={t.chipClass}
                    style={t.accentStyle}
                    data-key={t.key}
                    aria-selected={t.isActive}
                    onclick={handleTabSelect}
                    onkeydown={handleTabKey}
                >
                    <span class="wm-tab-label">{t.label}</span>
                    <span class="wm-tab-count">{t.count}</span>
                </button>
            </template>
        </div>

        <!-- Wire list — shared custom datatable inside a lightning-card (matches Prospects) -->
        <lightning-card class="wm-table">
            <span slot="title" class="wm-card-title">
                <lightning-icon icon-name="standard:currency" size="small"></lightning-icon>
                <span class="wm-card-title-text">Wire Matching · {summaryTitle} ({summaryCount})</span>
            </span>

            <template lwc:if={hasRows}>
                <c-offering-datatable
                    key-field="id"
                    data={rows}
                    columns={columns}
                    hide-checkbox-column>
                </c-offering-datatable>
            </template>

            <!-- Empty state (all tabs have rows, but kept for safety) -->
            <template lwc:else>
                <div class="wm-empty">
                    <lightning-icon icon-name="utility:moneybag" size="small" class="wm-empty-icon"></lightning-icon>
                    <p class="wm-empty-text">No wire transfers in this category.</p>
                </div>
            </template>

            <div slot="footer" class="view-all-footer">
                <a href="#" onclick={handleViewAll}>View All</a>
            </div>
        </lightning-card>
    </div>
</template>
