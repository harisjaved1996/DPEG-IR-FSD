<template>
    <div class="tg">
        <template if:false={isEmpty}>
            <div class="tg-pane">
                <div class="tg-groups">
                    <template for:each={railItems} for:item="s">
                        <button key={s.key} class={s.itemClass} data-key={s.key} onclick={select}>
                            <span class="tg-ring" style={s.ringStyle}>
                                <span class="tg-ring-inner">{s.letter}</span>
                            </span>
                            <span class="tg-gchip-body">
                                <span class="tg-gchip-name">{s.name}</span>
                                <span class="tg-gchip-sub">
                                    <span class="tg-gchip-count">{s.countLabel}</span>
                                    <template if:true={s.complete100}>
                                        <lightning-icon icon-name="utility:success" size="xx-small" class="tg-done-icon"></lightning-icon>
                                    </template>
                                </span>
                            </span>
                        </button>
                    </template>
                </div>

                <div class="tg-detail">
                    <div class="tg-detail-head">
                        <span class="tg-badge tg-badge--lg" style={current.badgeStyle}>{current.letter}</span>
                        <div class="tg-detail-titles">
                            <div class="tg-detail-name">
                                <span>{current.name}</span>
                                <template if:true={current.conditional}><span class="tg-cond">Conditional</span></template>
                            </div>
                            <div class="tg-detail-sub">
                                <span class="tg-detail-count">{current.countLabel}</span>
                            </div>
                        </div>
                    </div>
                    <div class="tg-detail-track"><div class="tg-bar" style={current.barStyle}></div></div>
                    <ul class="tg-tasks">
                        <template for:each={current.rows} for:item="r">
                            <li key={r.id} class={r.rowClass}>
                                <input type="checkbox" class="tg-check" checked={r.done} disabled={r.done}
                                    data-id={r.id} data-wire={r.wire} data-subject={r.subject} onchange={handleCheck} />
                                <span class="tg-subject">{r.subject}</span>
                                <span class="tg-resp">{r.responsibility}</span>
                                <template if:true={r.showCritical}>
                                    <span class="tg-flag" title="Critical control — verify before proceeding">
                                        <lightning-icon icon-name="utility:shield" size="xx-small" class="tg-flag-icon"></lightning-icon>Critical
                                    </span>
                                </template>
                                <template if:true={r.verified}>
                                    <span class="tg-flag tg-flag--ok" title="Verbal wire verification on file">
                                        <lightning-icon icon-name="utility:check" size="xx-small" class="tg-ok-icon"></lightning-icon>{r.verifiedLabel}
                                    </span>
                                </template>
                                <span class="tg-meta">{r.meta}</span>
                                <template if:true={r.hasDetails}>
                                    <button class="tg-view-btn" data-id={r.id} onclick={viewTask} title="View saved details">View</button>
                                </template>
                            </li>
                        </template>
                    </ul>
                </div>
            </div>
        </template>

        <template if:true={isEmpty}>
            <div class="tg-empty">No tasks yet. Set the Contract Executed Date to generate the checklist.</div>
        </template>
    </div>

    <template if:true={showWireModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open tg-modal">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={cancelWire}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title slds-hyphenate">Complete Wire Verification</h2>
                    <p class="tg-modal-sub">{wireSubject}</p>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="tg-verify-banner">
                        <lightning-icon icon-name="utility:shield" size="x-small" class="tg-flag-icon"></lightning-icon>
                        <span>Anti-fraud control: call the title company / lender on an independently looked-up number and verify every digit by phone before closing this task.</span>
                    </div>
                    <lightning-input type="text" label="Confirmed by (name)" value={wireVerifiedBy} onchange={handleVerifiedBy} required field-level-help="Person who verbally confirmed the wiring instructions"></lightning-input>
                    <lightning-input type="text" label="Phone number used" value={wirePhone} onchange={handlePhone} required class="slds-m-top_small" field-level-help="Independently looked-up number you called to verify"></lightning-input>
                    <lightning-textarea label="Comments" value={wireComments} onchange={handleWireComments} class="tg-notes-input slds-m-top_small" placeholder="Add comments for this verification…"></lightning-textarea>
                    <template if:true={wireError}>
                        <p class="tg-modal-error">{wireError}</p>
                    </template>
                    <p class="tg-modal-note">Your comments and a verification note will be saved to this task automatically.</p>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={cancelWire}>Cancel</button>
                    <button class="slds-button slds-button_brand" onclick={submitWire} disabled={wireSaveDisabled}>Mark Verified &amp; Complete</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showConfirmModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="tg-confirm-heading" class="slds-modal slds-fade-in-open tg-modal">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={cancelConfirm}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    </button>
                    <h2 id="tg-confirm-heading" class="slds-modal__title slds-hyphenate">Complete Task?</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p class="tg-confirm-subject">{confirmSubject}</p>
                    <lightning-textarea label="Comments" value={confirmNotes} onchange={handleConfirmNotes} class="tg-notes-input slds-m-top_small" placeholder="Add comments for this task…"></lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={cancelConfirm}>Cancel</button>
                    <button class="slds-button slds-button_brand" onclick={confirmComplete}>Confirm</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showViewModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="tg-view-heading" class="slds-modal slds-fade-in-open tg-modal">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeView}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    </button>
                    <h2 id="tg-view-heading" class="slds-modal__title slds-hyphenate">Task Details</h2>
                    <p class="tg-modal-sub">{viewData.subject}</p>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={viewData.hasWire}>
                        <div class="tg-view-row">
                            <span class="tg-view-label">Confirmed by</span>
                            <span class="tg-view-val">{viewData.verifiedBy}</span>
                        </div>
                        <div class="tg-view-row">
                            <span class="tg-view-label">Phone used</span>
                            <span class="tg-view-val">{viewData.phone}</span>
                        </div>
                        <div class="tg-view-row">
                            <span class="tg-view-label">Verified at</span>
                            <span class="tg-view-val">{viewData.verifiedAt}</span>
                        </div>
                    </template>
                    <template if:true={viewData.hasNotes}>
                        <div class="tg-view-notes-label">Comments</div>
                        <p class="tg-view-notes">{viewData.notes}</p>
                    </template>
                    <template if:false={viewData.hasAny}>
                        <p class="tg-modal-note">No additional details were recorded for this task.</p>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_brand" onclick={closeView}>Close</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
