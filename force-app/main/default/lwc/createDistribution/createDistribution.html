<template>
    <div class="dist-page">
        <!-- Details section -->
        <section class="section-card">
            <div class="section-header">Details</div>
            <div class="section-body">
                <div class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                        <lightning-input
                            type="date"
                            label="Date"
                            required
                            value={date}
                            onchange={handleDateChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                        <lightning-combobox
                            label="Source"
                            required
                            value={source}
                            options={sourceOptions}
                            onchange={handleSourceChange}>
                        </lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                        <lightning-combobox
                            label="Distribution Period"
                            required
                            value={period}
                            options={periodOptions}
                            onchange={handlePeriodChange}>
                        </lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                        <lightning-input
                            type="date"
                            label="Effective Date"
                            required
                            value={effectiveDate}
                            onchange={handleEffectiveDateChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 field">
                        <lightning-textarea
                            label="Description"
                            required
                            max-length="255"
                            value={description}
                            onchange={handleDescriptionChange}>
                        </lightning-textarea>
                        <p class="help-text">255 characters max</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Pro Rata section -->
        <section class="section-card">
            <div class="section-header">Pro Rata</div>
            <div class="section-body">
                <div class="prorata-controls">
                    <div class="control field">
                        <lightning-combobox
                            label="Type"
                            value={type}
                            options={typeOptions}
                            onchange={handleTypeChange}>
                        </lightning-combobox>
                    </div>
                    <div class="control field">
                        <lightning-input
                            type="number"
                            formatter="currency"
                            label="Total Amount"
                            value={totalAmount}
                            onchange={handleAmountChange}>
                        </lightning-input>
                    </div>
                    <div class="control apply-cell">
                        <lightning-button
                            label="Apply"
                            variant="brand"
                            onclick={handleApply}>
                        </lightning-button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table class="pro-table">
                        <thead>
                            <tr>
                                <th>Investing Entity</th>
                                <th>Membership</th>
                                <th class="num">Ownership</th>
                                <th class="num">Preferred Return</th>
                                <th class="num">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={rows} for:item="row">
                                <tr key={row.id}>
                                    <td class="entity">{row.entity}</td>
                                    <td>{row.membership}</td>
                                    <td class="num">{row.ownershipLabel}</td>
                                    <td class="num">
                                        <lightning-formatted-number
                                            value={row.preferred}
                                            format-style="currency"
                                            currency-code="USD">
                                        </lightning-formatted-number>
                                    </td>
                                    <td class="num">
                                        <lightning-formatted-number
                                            value={row.preferred}
                                            format-style="currency"
                                            currency-code="USD">
                                        </lightning-formatted-number>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                        <tfoot>
                            <tr class="totals-row">
                                <td class="total-label">Total</td>
                                <td></td>
                                <td></td>
                                <td class="num">
                                    <lightning-formatted-number
                                        value={grandPreferred}
                                        format-style="currency"
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </td>
                                <td class="num">
                                    <lightning-formatted-number
                                        value={grandTotal}
                                        format-style="currency"
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </section>

        <footer class="page-footer">
            <lightning-button
                label="Save"
                variant="brand"
                onclick={handleSave}>
            </lightning-button>
        </footer>
    </div>
</template>
