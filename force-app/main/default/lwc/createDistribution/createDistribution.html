<template>
    <div class="dist-page">
        <!-- Details -->
        <article class="card">
            <div class="card-header">
                <lightning-icon icon-name="standard:record" size="small" class="card-icon"></lightning-icon>
                <h2 class="card-title">Details</h2>
            </div>
            <div class="card-body">
                <div class="filter-panel">
                <div class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                        <lightning-input
                            type="date"
                            label="Date"
                            required
                            value={date}
                            onchange={handleDateChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                        <lightning-combobox
                            label="Source"
                            required
                            value={source}
                            options={sourceOptions}
                            onchange={handleSourceChange}>
                        </lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                        <lightning-combobox
                            label="Distribution Period"
                            required
                            value={period}
                            options={periodOptions}
                            onchange={handlePeriodChange}>
                        </lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                        <lightning-input
                            type="date"
                            label="Effective Date"
                            required
                            value={effectiveDate}
                            onchange={handleEffectiveDateChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                        <lightning-textarea
                            label="Description"
                            required
                            max-length="255"
                            value={description}
                            onchange={handleDescriptionChange}>
                        </lightning-textarea>
                        <p class="help-text">255 characters max</p>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                        <lightning-combobox
                            label="Bank Account"
                            value={bankAccount}
                            options={bankAccountOptions}
                            onchange={handleBankAccountChange}>
                        </lightning-combobox>
                    </div>
                </div>
                </div>
            </div>
        </article>

        <!-- Pro Rata -->
        <article class="card">
            <div class="card-header">
                <lightning-icon icon-name="standard:currency" size="small" class="card-icon"></lightning-icon>
                <h2 class="card-title">Pro Rata</h2>
            </div>
            <div class="card-body">
                <div class="filter-panel">
                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                            <lightning-combobox
                                label="Type"
                                value={type}
                                options={typeOptions}
                                onchange={handleTypeChange}>
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 field">
                            <lightning-input
                                type="number"
                                formatter="currency"
                                label="Total Amount"
                                value={totalAmount}
                                onchange={handleAmountChange}>
                            </lightning-input>
                        </div>
                    </div>
                    <div class="filter-apply">
                        <lightning-button
                            label="Apply"
                            variant="brand"
                            onclick={handleApply}>
                        </lightning-button>
                    </div>
                </div>

                <div class="table-wrap">
                    <lightning-datatable
                        key-field="id"
                        data={rows}
                        columns={columns}
                        hide-checkbox-column>
                    </lightning-datatable>
                </div>
            </div>
        </article>

        <footer class="page-footer">
            <lightning-button
                label="Save"
                variant="brand"
                onclick={handleSave}>
            </lightning-button>
        </footer>
    </div>
</template>
