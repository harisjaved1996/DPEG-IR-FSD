<template>
    <lightning-card icon-name="standard:contact">
        <span slot="title">Associated Contacts ({recordCount})</span>

        <lightning-button
            slot="actions"
            label="Add Contact"
            title="Add Contact"
            onclick={handleNew}>
        </lightning-button>

        <lightning-datatable
            key-field="id"
            data={data}
            columns={columns}
            hide-checkbox-column>
        </lightning-datatable>

        <div slot="footer" class="view-all-footer">
            <a href="#" onclick={handleViewAll}>View All</a>
        </div>
    </lightning-card>
</template>
