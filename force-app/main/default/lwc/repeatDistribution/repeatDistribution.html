<template>
    <div class="detail-wrap">
        <template for:each={rows} for:item="row">
            <div key={row.id} class="detail-card">
                <div class="detail-grid">
                    <div class="field">
                        <span class="f-label">Date</span>
                        <span class="f-value">{row.date}</span>
                    </div>
                    <div class="field">
                        <span class="f-label">Effective Date</span>
                        <span class="f-value">{row.effectiveDate}</span>
                    </div>
                    <div class="field">
                        <span class="f-label">Period</span>
                        <span class="f-value">{row.period}</span>
                    </div>
                    <div class="field">
                        <span class="f-label">Description</span>
                        <span class="f-value">{row.description}</span>
                    </div>
                    <div class="field">
                        <span class="f-label">Source</span>
                        <span class="f-value">{row.source}</span>
                    </div>
                    <div class="field">
                        <span class="f-label">Paid Status</span>
                        <span class="f-value">
                            <span class={row.statusBadge}>{row.paidStatus}</span>
                        </span>
                    </div>
                    <div class="field">
                        <span class="f-label">Type</span>
                        <span class="f-value">{row.type}</span>
                    </div>
                    <div class="field">
                        <span class="f-label">Amount</span>
                        <span class="f-value">
                            <lightning-formatted-number
                                value={row.amount}
                                format-style="currency"
                                currency-code="USD">
                            </lightning-formatted-number>
                        </span>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <div class="verify-bar">
        <lightning-button
            label="Verify"
            variant="brand-outline"
            onclick={handleVerify}>
        </lightning-button>
    </div>
</template>
