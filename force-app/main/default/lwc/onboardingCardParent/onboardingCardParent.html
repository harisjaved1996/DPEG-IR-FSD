<template>
    <div class="oc-card">
        <div class="oc-title">
            <lightning-icon
                icon-name="utility:lead"
                size="small"
                class="oc-icon-plain"
                style={headerIconStyle}>
            </lightning-icon>
            <span class="slds-text-heading_medium oc-title-text">Onboarding Health</span>
        </div>

        <div class="cards-grid">
            <template for:each={stats} for:item="stat">
                <c-onboarding-card-child
                    key={stat.key}
                    value={stat.value}
                    label={stat.label}
                    icon-name={stat.iconName}
                    icon-color={stat.iconColor}>
                </c-onboarding-card-child>
            </template>
        </div>
    </div>
</template>
