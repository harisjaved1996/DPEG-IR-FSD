<template>
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Method</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <template for:each={pagedData} for:item="row">
                    <tr key={row.id}>
                        <td class="col-type">{row.type}</td>
                        <td class="col-amount">{row.amount}</td>
                        <td class="col-method">{row.method}</td>
                        <td><span class={row.statusClass}>{row.status}</span></td>
                    </tr>
                </template>
            </tbody>
        </table>
        <div class="pagination">
            <button class="page-btn" disabled={isFirstPage} onclick={handlePrevious} type="button">&#8249; Prev</button>
            <span class="page-info">Page {currentPage} of {totalPages}</span>
            <button class="page-btn" disabled={isLastPage} onclick={handleNext} type="button">Next &#8250;</button>
        </div>
    </div>
</template>
