<template>
    <div class="ir-property-overview">
        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_large">
                <lightning-spinner alternative-text="Loading property overview" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={showEmpty}>
            <div class="slds-illustration slds-illustration_small slds-p-around_large slds-text-align_center">
                <p class="slds-text-body_regular slds-text-color_weak">
                    No property is linked to this offering.
                </p>
            </div>
        </template>

        <template lwc:if={hasProperty}>
            <lightning-layout multiple-rows="true" pull-to-boundary="small">
                <!-- PROPERTY DETAIL -->
                <lightning-layout-item size="12" medium-device-size="6" padding="around-small">
                    <c-section-card title="Property Detail" icon-name="utility:location">
                        <dl class="ir-property-overview__grid">
                            <template for:each={detailFields} for:item="field">
                                <div key={field.key} class="ir-property-overview__row">
                                    <dt class="slds-text-color_weak ir-property-overview__label">{field.label}</dt>
                                    <dd class="ir-property-overview__value">{field.value}</dd>
                                </div>
                            </template>
                        </dl>
                    </c-section-card>
                </lightning-layout-item>

                <!-- FINANCIAL SNAPSHOT -->
                <lightning-layout-item size="12" medium-device-size="6" padding="around-small">
                    <c-section-card title="Financial Snapshot" icon-name="utility:moneybag">
                        <dl class="ir-property-overview__grid">
                            <template for:each={financialFields} for:item="field">
                                <div key={field.key} class="ir-property-overview__row">
                                    <dt class="slds-text-color_weak ir-property-overview__label">{field.label}</dt>
                                    <dd class="ir-property-overview__value">{field.value}</dd>
                                </div>
                            </template>
                        </dl>
                    </c-section-card>
                </lightning-layout-item>
            </lightning-layout>
        </template>

        <template lwc:if={hasError}>
            <div class="slds-box slds-theme_error slds-m-top_small" role="alert">
                <p class="slds-text-body_regular">
                    Unable to load the property overview. Please refresh or contact your administrator.
                </p>
            </div>
        </template>
    </div>
</template>
