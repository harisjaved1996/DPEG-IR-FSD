<template>
    <article class={computedClass} aria-labelledby={headingId}>
        <header class="slds-grid slds-grid_align-spread ir-section-card__header">
            <div class="slds-media slds-media_center slds-has-flexi-truncate">
                <template lwc:if={hasIcon}>
                    <div class="slds-media__figure">
                        <lightning-icon
                            icon-name={iconName}
                            size="small"
                            class="ir-section-card__icon"
                        ></lightning-icon>
                    </div>
                </template>
                <div class="slds-media__body">
                    <h2
                        id={headingId}
                        class="slds-text-heading_small slds-truncate ir-section-card__title"
                    >
                        {title}
                    </h2>
                </div>
            </div>
            <div class="slds-no-flex ir-section-card__actions">
                <slot name="actions"></slot>
            </div>
        </header>
        <div class="ir-section-card__body">
            <slot></slot>
        </div>
    </article>
</template>
