<template>
    <div class="ir-share-transfers">
        <header class="slds-m-bottom_medium ir-share-transfers__header">
            <h1 class="slds-text-heading_large ir-share-transfers__title">Share Transfers</h1>
            <p class="slds-text-body_small slds-text-color_weak">Secondary share transfers across their approval lifecycle.</p>
        </header>

        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_large ir-share-transfers__loader">
                <lightning-spinner alternative-text="Loading Share Transfers" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={showContent}>
            <!-- KPI ROW -->
            <template lwc:if={hasKpis}>
                <lightning-layout multiple-rows="true" class="slds-m-bottom_medium ir-share-transfers__kpis">
                    <template for:each={kpis} for:item="kpi">
                        <lightning-layout-item
                            key={kpi.key}
                            size="12"
                            small-device-size="6"
                            medium-device-size="3"
                            large-device-size="3"
                            padding="around-x-small"
                        >
                            <c-kpi-card
                                label={kpi.label}
                                value={kpi.displayValue}
                                unit={kpi.unit}
                                trend={kpi.trend}
                                icon-name={kpi.iconName}
                                accent={kpi.accent}
                            ></c-kpi-card>
                        </lightning-layout-item>
                    </template>
                </lightning-layout>
            </template>

            <!-- LIFECYCLE BOARD -->
            <div class="slds-m-bottom_medium">
                <c-ir-transfer-board
                    title="Transfer Lifecycle"
                    lanes={board}
                    ontransferselect={handleTransferSelect}
                ></c-ir-transfer-board>
            </div>

            <!-- TRANSFERS TABLE -->
            <c-data-table-card
                title="All Share Transfers"
                icon-name="utility:share"
                key-field="id"
                columns={transferColumns}
                rows={transfers}
                empty-message="No share transfers to display."
            ></c-data-table-card>
        </template>

        <template lwc:if={hasError}>
            <div class="slds-box slds-theme_error slds-m-top_small" role="alert">
                <p class="slds-text-body_regular">
                    Unable to load Share Transfers. Please refresh or contact your administrator.
                </p>
            </div>
        </template>
    </div>
</template>
