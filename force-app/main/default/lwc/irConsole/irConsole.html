<template>
    <div class="ir-console">
        <header class="slds-m-bottom_medium ir-console__header">
            <h1 class="slds-text-heading_large ir-console__title">Investor Relations Console</h1>
            <p class="slds-text-body_small slds-text-color_weak">Operational view: capital flow, wires, and action queue.</p>
        </header>

        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_large ir-console__loader">
                <lightning-spinner alternative-text="Loading IR Console" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={showContent}>
            <!-- KPI ROW -->
            <template lwc:if={hasKpis}>
                <lightning-layout multiple-rows="true" class="slds-m-bottom_medium ir-console__kpis">
                    <template for:each={kpis} for:item="kpi">
                        <lightning-layout-item
                            key={kpi.key}
                            size="12"
                            small-device-size="6"
                            medium-device-size="4"
                            large-device-size="2"
                            padding="around-x-small"
                        >
                            <c-kpi-card
                                label={kpi.label}
                                value={kpi.displayValue}
                                unit={kpi.unit}
                                trend={kpi.trend}
                                icon-name={kpi.iconName}
                                accent={kpi.accent}
                            ></c-kpi-card>
                        </lightning-layout-item>
                    </template>
                </lightning-layout>
            </template>

            <!-- ACTIVE OFFERINGS TABLE (full width) -->
            <div class="slds-m-bottom_medium">
                <c-ir-active-offerings-table
                    offerings={activeOfferings}
                ></c-ir-active-offerings-table>
            </div>

            <lightning-layout multiple-rows="true" pull-to-boundary="small">
                <!-- DISTRIBUTION SPLIT -->
                <lightning-layout-item
                    size="12"
                    medium-device-size="6"
                    large-device-size="4"
                    padding="around-small"
                >
                    <c-section-card title="Distribution Split" icon-name="utility:pie_chart_filled">
                        <template lwc:if={hasSplit}>
                            <div class="slds-align_absolute-center ir-console__donut">
                                <c-donut-chart
                                    slices={distributionSplit}
                                    size="180"
                                    center-label="Distributed"
                                    center-value={splitTotalText}
                                ></c-donut-chart>
                            </div>
                        </template>
                        <template lwc:else>
                            <p class="slds-text-body_regular slds-text-color_weak slds-p-vertical_small">
                                No distribution payments to split.
                            </p>
                        </template>
                    </c-section-card>
                </lightning-layout-item>

                <!-- ACTION QUEUE -->
                <lightning-layout-item
                    size="12"
                    medium-device-size="6"
                    large-device-size="5"
                    padding="around-small"
                >
                    <c-section-card title="Action Queue" icon-name="utility:task">
                        <c-ir-action-queue
                            items={actionQueue}
                            onitemselect={handleActionSelect}
                        ></c-ir-action-queue>
                    </c-section-card>
                </lightning-layout-item>

                <!-- AUTOMATION BASELINES (static) -->
                <lightning-layout-item
                    size="12"
                    medium-device-size="12"
                    large-device-size="3"
                    padding="around-small"
                >
                    <c-section-card title="Automation Baselines" icon-name="utility:settings" compact>
                        <dl class="ir-console__baselines">
                            <template for:each={automationBaselines} for:item="baseline">
                                <div key={baseline.key} class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center ir-console__baseline-row">
                                    <dt class="slds-text-color_weak slds-truncate ir-console__baseline-label">
                                        {baseline.label}
                                    </dt>
                                    <dd class="slds-text-align_right slds-no-flex ir-console__baseline-value">
                                        {baseline.value}
                                    </dd>
                                </div>
                            </template>
                        </dl>
                    </c-section-card>
                </lightning-layout-item>
            </lightning-layout>
        </template>

        <template lwc:if={hasError}>
            <div class="slds-box slds-theme_error slds-m-top_small" role="alert">
                <p class="slds-text-body_regular">
                    Unable to load the IR Console. Please refresh or contact your administrator.
                </p>
            </div>
        </template>
    </div>
</template>
